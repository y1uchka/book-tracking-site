<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трекер чтения книг</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="main-header">
        <div id="heading">
            <p class="displayXL">My book tracker<p>
            <p class="displayL">Keep track of your reading journey</p>
        </div>
    </header>
    <main>
        <!-- currently reading -->
        <section id="progress-check">
            <div id="read-block" style="display: none;">
                <p class="displayM">Currently reading</p>
                <div id="read-books-cards"></div>
            </div>
        </section>
        <!-- total/progress/complete count-->
        <section id="stats-number">
            <div>
                <div id="total-count">0</div>
                <p class="paragraphM">Total Books</p>
            </div>
            <div>
                <div id="plans-count">0</div>
                <p class="paragraphM">in Plans</p>
            </div>
            <div>
                <div id="complete-count">0</div>
                <p class="paragraphM">Completed</p>
            </div>
        </section>
        <!-- library with all books
        add filter on all/read/finished -->
        <section id="main-page">
            <div id="inputBook">
                <button id="showFormBtn">Add new book</button>
                <div id="input-form" style="display: none;">
                    <div class="column">
                        <label for="bookTitle" class="paragraphXS">Book Title</label>
                        <input type="text" id="titleBook" placeholder="Enter book title">
                    </div>
                    <div class="column">
                        <label for="bookAuthor" class="paragraphXS">Author</label>
                        <input type="text" id="bookAuthor" placeholder="Enter author name">
                    </div>
                    <div class="column">
                        <label for="pagesCount" class="paragraphXS">Total pages</label>
                        <input type="number" id="pagesCount">
                    </div>
                    <div class="row">
                        <label for="bookStatus" class="paragraphXS">Status</label>
                        <select id="bookStatus">
                            <option value="plans">in Plans</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                    <div class="row">
                        <button id="saveBookBtn">Add book</button>
                        <button id="cancelAddBook">Cancel</button>
                    </div>
                </div>
            </div>
            <div id="library-total">
                
                <p>My library</p>
                <div id="total-books"></div>
            </div>
        </section>
        <!-- statistics -->
        <section>
        </section>
    </main>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
